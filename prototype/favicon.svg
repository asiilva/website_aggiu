<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- Original Aggiu dot-cluster mark (symbol only) -->

  <!-- Center - large dark dot -->
  <circle cx="34" cy="30" r="6.5" fill="#0D2240"/>

  <!-- Inner ring - dark navy dots -->
  <circle cx="22" cy="24" r="4.5" fill="#1B3A5C"/>
  <circle cx="22" cy="36" r="4.5" fill="#1B3A5C"/>
  <circle cx="34" cy="16" r="4" fill="#1B3A5C"/>
  <circle cx="34" cy="44" r="4" fill="#1B3A5C"/>
  <circle cx="44" cy="22" r="3.5" fill="#1B3A5C"/>
  <circle cx="44" cy="38" r="3.5" fill="#1B3A5C"/>

  <!-- Mid ring - medium blue dots -->
  <circle cx="14" cy="16" r="4" fill="#4A7EB5"/>
  <circle cx="14" cy="30" r="4" fill="#4A7EB5"/>
  <circle cx="14" cy="44" r="4" fill="#4A7EB5"/>
  <circle cx="24" cy="10" r="3.5" fill="#4A7EB5"/>
  <circle cx="24" cy="50" r="3.5" fill="#4A7EB5"/>

  <!-- Outer ring - light blue dots -->
  <circle cx="6" cy="22" r="3" fill="#9DC2E6"/>
  <circle cx="6" cy="38" r="3" fill="#9DC2E6"/>
  <circle cx="8" cy="10" r="2.5" fill="#9DC2E6"/>
  <circle cx="8" cy="50" r="2.5" fill="#9DC2E6"/>
  <circle cx="16" cy="6" r="2.5" fill="#9DC2E6"/>
  <circle cx="16" cy="54" r="2.5" fill="#9DC2E6"/>

  <!-- Outermost - lightest dots -->
  <circle cx="4" cy="30" r="2" fill="#C5DCF0"/>
  <circle cx="6" cy="14" r="2" fill="#C5DCF0"/>
  <circle cx="6" cy="46" r="2" fill="#C5DCF0"/>
</svg>
